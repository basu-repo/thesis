[General]
network = HuskyToUavRelay
scheduler-class = "omnetpp::cRealTimeScheduler"
sim-time-limit = 1h
cmdenv-express-mode = true

*.relay.listenPort = 5001
*.relay.destAddress = "127.0.0.1"
*.relay.destPort = 5002
*.relay.pollInterval = 0.01s

[Config WifiRelay]
description = "Moderate latency / jitter / small loss"
*.relay.fixedDelay = 0.04s
*.relay.jitter = 0.01s
*.relay.dropProbability = 0.01

[Config BluetoothRelay]
description = "Higher latency / more jitter / more loss"
*.relay.fixedDelay = 0.12s
*.relay.jitter = 0.03s
*.relay.dropProbability = 0.03
